name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to release
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go test -tags=integration ./integration
      - run: go vet ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${RELEASE_TAG#v}"
          package="git-clonepath_${version}_${GOOS}_${GOARCH}"
          mkdir "${package}"
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${package}/git-clonepath" \
            ./cmd/git-clonepath
          cp README.md "${package}/"
          tar -czf "${package}.tar.gz" "${package}"
      - uses: actions/upload-artifact@v7
        with:
          name: git-clonepath-${{ matrix.goos }}-${{ matrix.goarch }}
          path: git-clonepath_*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum git-clonepath_*.tar.gz > SHA256SUMS
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" \
              dist/* \
              --generate-notes \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${RELEASE_TAG}"
          fi
